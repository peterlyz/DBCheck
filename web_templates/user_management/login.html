<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBCheck - 用户登录</title>
    <style>
        /* ─── 动态背景 ─── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #0a0a1a 0%, #12122e 50%, #1a1040 100%);
            position: relative;
            overflow: hidden;
        }
        html[data-theme="light"] body {
            background: linear-gradient(160deg, #f0f4ff 0%, #e8ecff 50%, #f5f0ff 100%);
        }

        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: 0;
            animation: glowFloat 18s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .bg-glow.g1 {
            width: 600px; height: 600px;
            background: #6c5ce7;
            top: -200px; left: -100px;
        }
        .bg-glow.g2 {
            width: 500px; height: 500px;
            background: #0984e3;
            bottom: -150px; right: -100px;
            animation-delay: -6s; animation-duration: 22s;
        }
        .bg-glow.g3 {
            width: 350px; height: 350px;
            background: #e84393;
            top: 40%; left: 60%;
            animation-delay: -12s; animation-duration: 25s;
            opacity: 0.2;
        }

        @keyframes glowFloat {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(40px, -30px) scale(1.08); }
            66%  { transform: translate(-20px, 25px) scale(0.95); }
            100% { transform: translate(15px, -10px) scale(1.03); }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(108,92,231,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,92,231,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
            pointer-events: none;
        }

        /* ─── 登录卡片 ─── */
        .login-wrap {
            position: relative;
            z-index: 1;
            animation: cardEntry 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(32px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card {
            position: relative;
            width: 400px;
            padding: 40px 36px 36px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.25),
                0 2px 8px rgba(0,0,0,0.15),
                inset 0 1px 0 rgba(255,255,255,0.06);
            overflow: hidden;
        }
        html[data-theme="light"] .login-card {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(108,92,231,0.12);
            box-shadow:
                0 20px 60px rgba(108,92,231,0.12),
                0 4px 16px rgba(0,0,0,0.06);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #6c5ce7, #a29bfe, transparent);
            opacity: 0.7;
        }

        /* ─── Logo 区域 ─── */
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-ring {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            margin-bottom: 20px;
            animation: ringPulse 3s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(108,92,231,0.5)) drop-shadow(0 0 28px rgba(108,92,231,0.25)); }
            50%       { filter: drop-shadow(0 0 20px rgba(108,92,231,0.7)) drop-shadow(0 0 40px rgba(162,155,254,0.35)); }
        }

        .logo-img {
            width: 82px;
            height: 82px;
            border-radius: 20px;
            object-fit: contain;
            display: block;
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a29bfe 50%, #6c5ce7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            text-align: center;
        }
        html[data-theme="light"] .login-title {
            background: linear-gradient(135deg, #1e293b 0%, #6c5ce7 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .login-subtitle {
            font-size: 12.5px;
            color: rgba(255,255,255,0.45);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
            text-align: center;
            margin-bottom: 32px;
        }
        html[data-theme="light"] .login-subtitle {
            color: #94a3b8;
        }

        /* ─── 表单 ─── */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            margin-bottom: 7px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        html[data-theme="light"] .form-label {
            color: #64748b;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            box-sizing: border-box;
        }
        html[data-theme="light"] .form-input {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: #1e293b;
        }
        .form-input:focus {
            border-color: #6c5ce7;
            background: rgba(108,92,231,0.06);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.1), inset 0 1px 4px rgba(108,92,231,0.05);
        }
        .form-input::placeholder { color: rgba(255,255,255,0.2); }
        html[data-theme="light"] .form-input::placeholder { color: #94a3b8; }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
            transition: color 0.25s;
            margin-top: 10px;
        }
        .form-group:focus-within .input-icon { color: #6c5ce7; }

        .pwd-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.25s, background 0.25s;
            margin-top: 10px;
        }
        .pwd-toggle:hover {
            color: #6c5ce7;
            background: rgba(108,92,231,0.08);
        }

        /* ─── 登录按钮 ─── */
        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 50%, #6c5ce7 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            animation: btnBgShift 4s ease-in-out infinite;
        }
        @keyframes btnBgShift {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }
        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108,92,231,0.4), 0 2px 8px rgba(108,92,231,0.2);
        }
        .login-btn:hover::before { opacity: 1; }
        .login-btn:active { transform: translateY(0) scale(0.98); }

        .login-btn.loading { pointer-events: none; opacity: 0.75; }
        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            top: 50%; left: 50%;
            margin: -10px 0 0 -10px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: loginSpin 0.6s linear infinite;
        }
        @keyframes loginSpin { to { transform: rotate(360deg); } }

        /* ─── 错误提示 ─── */
        .login-error {
            color: #ff6b6b;
            font-size: 12.5px;
            margin-top: 14px;
            text-align: center;
            min-height: 20px;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .login-error.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ─── 卡片抖动 ─── */
        .login-card.shake {
            animation: cardShake 0.4s ease;
        }
        @keyframes cardShake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-8px); }
            40%     { transform: translateX(8px); }
            60%     { transform: translateX(-5px); }
            80%     { transform: translateX(5px); }
        }

        /* ─── 底部版本信息 ─── */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        html[data-theme="light"] .login-footer {
            color: #94a3b8;
            opacity: 0.85;
        }

        /* ─── 主题切换按钮 ─── */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000000;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: color 0.25s, border-color 0.25s, transform 0.25s;
        }
        .theme-toggle:hover {
            color: #6c5ce7;
            border-color: #6c5ce7;
            transform: rotate(15deg);
        }

        /* ─── 演示账户信息 ─── */
        .demo-info {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-align: center;
        }
        html[data-theme="light"] .demo-info {
            background: rgba(108,92,231,0.05);
            color: #64748b;
        }
        .demo-info strong {
            color: rgba(255,255,255,0.6);
        }
        html[data-theme="light"] .demo-info strong {
            color: #1e293b;
        }
    </style>
</head>
<body>
    <!-- 背景层 -->
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    <div class="bg-glow g3"></div>
    <div class="bg-grid"></div>

    <!-- 主题切换 -->
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

    <!-- 登录卡片 -->
    <div class="login-wrap">
        <div class="login-card">
            <!-- Logo 区域 -->
            <div class="logo-area">
                <div class="logo-ring">
                    <img src="/dbcheck_logo.png" class="logo-img" alt="DBCheck"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="logo-inner" style="display:none; width:100%; height:100%; border-radius:20px; background:#0a0a1a; align-items:center; justify-content:center; font-size:36px; font-weight:900; color:#6c5ce7;">D</div>
                </div>
                <div class="login-title">DBCheck</div>
                <div class="login-subtitle">智能数据库巡检与性能分析平台</div>
            </div>

            <!-- 表单 -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input id="username" type="text" class="form-input" placeholder="请输入用户名" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input id="password" type="password" class="form-input" placeholder="请输入密码" required>
                    <button type="button" class="pwd-toggle" onclick="togglePwd()" title="显示/隐藏密码">
                        <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <div id="errorMsg" class="login-error"></div>

                <button type="submit" class="login-btn" id="btn-login">
                    <span id="btn-text">登  录</span>
                </button>
            </form>

            <div class="demo-info">
                <strong>演示账户:</strong>
                <div style="margin-top:6px;">
                    <div>管理员: admin / admin123</div>
                    <div>只读: viewer / viewer123</div>
                    <div>运维: operator / operator123</div>
                </div>
            </div>

            <div class="login-footer">
                <span id="login-version">v2.6.3</span> · DBCheck © 2026
            </div>
        </div>
    </div>

    <script>
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            if (current === 'light') {
                html.removeAttribute('data-theme');
                localStorage.setItem('dbcheck-theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
                localStorage.setItem('dbcheck-theme', 'light');
            }
        }

        // 初始化主题
        (function() {
            const saved = localStorage.getItem('dbcheck-theme');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();

        // 显示/隐藏密码
        function togglePwd() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.45 18.45 0 0 1-5.06 5.94M1 1l22 22"/>';
            } else {
                pwd.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('errorMsg');
            const btnLogin = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');
            
            errorEl.classList.remove('show');
            btnLogin.classList.add('loading');
            btnText.textContent = '登录中...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorEl.textContent = '请输入用户名和密码';
                errorEl.classList.add('show');
                btnLogin.classList.remove('loading');
                btnText.textContent = '登  录';
                return;
            }

            try {
                const res = await fetch('/api/um/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'  // 重要：携带 session cookie
                });
                const data = await res.json();
                
                if (data.code === 0) {
                    // 登录成功：保存token和用户信息
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // 重定向到首页
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.msg || '登录失败';
                    errorEl.classList.add('show');
                    
                    // 卡片抖动动画
                    const card = document.querySelector('.login-card');
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 400);
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请稍后重试';
                errorEl.classList.add('show');
            } finally {
                btnLogin.classList.remove('loading');
                btnText.textContent = '登  录';
            }
        });

        // 回车键提交
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
