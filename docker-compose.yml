version: "3.8"

services:
  dbcheck:
    build:
      context: .
      dockerfile: Dockerfile
    image: acdante-zhang/dbcheck:latest
    container_name: dbcheck
    restart: unless-stopped
    ports:
      - "5003:5003"
    volumes:
      # Persist SQLite databases and config
      - dbcheck_data:/app/data
      # Persist pro_data (RBAC users.db, um_rbac.db)
      - dbcheck_pro_data:/app/pro_data
      # Persist generated reports
      - dbcheck_reports:/app/reports
      # Mount drivers directory (read-only)
      - ./drivers:/app/drivers:ro
    environment:
      - TZ=Asia/Shanghai
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dbcheck_net

volumes:
  dbcheck_data:
  dbcheck_pro_data:
  dbcheck_reports:

networks:
  dbcheck_net:
    driver: bridge
