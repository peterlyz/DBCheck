name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v2.5.3)"
        required: true
        default: "v2.5.3"
      push:
        description: "Also push to Docker Hub & GHCR?"
        required: false
        default: "true"

env:
  DOCKER_IMAGE: jackge12345/dbcheck
  GHCR_IMAGE: ghcr.io/fiyo/dbcheck
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to Docker Hub ────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Login to GitHub Container Registry ─────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION_NUM="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_num=${VERSION_NUM}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (num: ${VERSION_NUM})"

      # ── Build & push (multi-arch, dual registry) ──
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version_num }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version_num }}
          labels: |
            org.opencontainers.image.title=DBCheck
            org.opencontainers.image.description=Database Intelligent Inspection Tool
            org.opencontainers.image.source=https://github.com/fiyo/DBCheck
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Image digest
        run: |
          echo "✅ Docker Hub  : ${{ env.DOCKER_IMAGE }}:latest"
          echo "✅ Docker Hub  : ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version_num }}"
          echo "✅ GHCR        : ${{ env.GHCR_IMAGE }}:latest"
          echo "✅ GHCR        : ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version_num }}"

      # ── Make GHCR package public ────────────────────
      - name: Set GHCR package visibility to public
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /users/${{ github.repository_owner }}/packages/container/dbcheck \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ── Create GitHub Release ───────────────────────
      - name: Create GitHub Release (on tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: DBCheck ${{ steps.version.outputs.version }}
          body: |
            ## Docker Images

            ### Docker Hub
            ```bash
            docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version_num }}
            docker run -d -p 5003:5003 \
              -v dbcheck_data:/app/data \
              -v dbcheck_reports:/app/reports \
              ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version_num }}
            ```

            ### GitHub Container Registry (China-friendly)
            ```bash
            docker pull ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version_num }}
            docker run -d -p 5003:5003 \
              -v dbcheck_data:/app/data \
              -v dbcheck_reports:/app/reports \
              ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version_num }}
            ```

            See [README](https://github.com/fiyo/DBCheck#docker-quick-start-recommended) for full usage.
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
