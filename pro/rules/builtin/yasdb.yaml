# -*- coding: utf-8 -*-
rules:
  # ── 系统资源 ──
  - id: yasdb_mem_usage_high
    name: System Memory Usage High
    name_zh: 系统内存使用率过高
    category: system
    db_types: [yashandb]
    severity: high
    priority: high
    owner: 系统管理员
    enabled: true
    description: System memory usage exceeds 90%
    description_zh: 系统内存使用率超过 90%
    condition: "mem_usage > 90"
    params:
      mem_usage: "${context.system_info.memory.usage_percent}"
    message: "System memory usage {mem_usage:.1f}%, exceeding 90% may trigger OOM"
    message_zh: "系统内存使用率 {mem_usage:.1f}%，超过 90% 可能触发 OOM"
    fix_sql: ""

  - id: yasdb_mem_usage_medium
    name: System Memory Usage Warning
    name_zh: 系统内存使用率预警
    category: system
    db_types: [yashandb]
    severity: medium
    priority: medium
    owner: 系统管理员
    enabled: true
    description: System memory usage exceeds 80%
    description_zh: 系统内存使用率超过 80%
    condition: "mem_usage > 80 and mem_usage <= 90"
    params:
      mem_usage: "${context.system_info.memory.usage_percent}"
    message: "System memory usage {mem_usage:.1f}%, attention needed"
    message_zh: "系统内存使用率 {mem_usage:.1f}%，建议关注"
    fix_sql: ""

  - id: yasdb_disk_usage_high
    name: Disk Space Critical
    name_zh: 磁盘空间紧张
    category: system
    db_types: [yashandb]
    severity: high
    priority: high
    owner: 系统管理员
    enabled: true
    description: Disk usage exceeds 90%
    description_zh: 磁盘使用率超过 90%
    condition: "any(disk.get('usage_percent', 0) > 90 for disk in disk_list)"
    params:
      disk_list: "${context.system_info.disk_list}"
    message: "Disk {mountpoint} usage {usage:.1f}%, may cause database write failures"
    message_zh: "磁盘 {mountpoint} 使用率 {usage:.1f}%，可能导致数据库写入失败"
    fix_sql: ""

  # ── YashanDB 特有规则（Oracle兼容） ──

  - id: yasdb_sga_pga_imbalance
    name: SGA/PGA Memory Imbalance
    name_zh: SGA/PGA 内存分配失衡
    category: memory
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: SGA and PGA memory allocation ratio is imbalanced
    description_zh: SGA 与 PGA 内存分配比例失衡
    condition: "sga_total > 0 and (pga_total / sga_total) > 2"
    params:
      sga_total: "${context.sga_total}"
      pga_total: "${context.pga_total}"
    message: "PGA memory ({pga}) is too large relative to SGA ({sga}), may affect concurrency"
    message_zh: "PGA 内存（{pga}）相对于 SGA（{sga}）过大，可能影响并发性能"
    fix_sql: "ALTER SYSTEM SET pga_aggregate_target = '2G' SCOPE=BOTH;"
    fix_params:
      pga: "pga_total"
      sga: "sga_total"

  - id: yasdb_conn_usage_high
    name: Connection Usage High
    name_zh: 连接数使用率过高
    category: connection
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Active sessions exceed 90% of max sessions
    description_zh: 活跃会话超过最大会话数的 90%
    condition: "max_sessions > 0 and (active_sessions / max_sessions * 100) > 90"
    params:
      max_sessions: "${context.session_limit}"
      active_sessions: "${context.sessions}"
    message: "Session usage at {pct:.1f}% ({active}/{max}), may reject new connections"
    message_zh: "会话使用率达 {pct:.1f}%（{active}/{max}），可能拒绝新连接"
    fix_sql: "ALTER SYSTEM SET processes = 500 SCOPE=SPFILE;"
    fix_params:
      pct: "(active_sessions / max_sessions * 100) if max_sessions > 0 else 0"

  - id: yasdb_long_running_query
    name: Long Running SQL
    name_zh: 长时间运行的 SQL
    category: performance
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: SQL running longer than 60 seconds detected
    description_zh: 存在运行超过 60 秒的 SQL
    condition: "len(long_queries) > 0"
    params:
      long_queries: "${context._long_queries}"
    message: "Found {n} SQL statements running longer than 60 seconds"
    message_zh: "发现 {n} 个运行超过 60 秒的 SQL"
    fix_sql: "SELECT SID, SERIAL#, SQL_ID FROM V$SESSION WHERE STATUS='ACTIVE' AND LAST_CALL_ET > 60;\n-- Kill session:\nALTER SYSTEM KILL SESSION 'sid,serial#' IMMEDIATE;"
    fix_params:
      n: "len(long_queries)"

  - id: yasdb_tablespace_full
    name: Tablespace Usage High
    name_zh: 表空间使用率过高
    category: storage
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Tablespace usage exceeds 90%
    description_zh: 表空间使用率超过 90%
    condition: "tablespaces and any(_int(ts.get('USED_PCT', 0)) > 90 for ts in tablespaces)"
    params:
      tablespaces: "${context.tablespace}"
    message: "Tablespace {ts_name} usage {pct}%, space shortage may cause database anomaly"
    message_zh: "表空间使用率达 {pct}%，空间不足可能导致数据库异常"
    fix_sql: "ALTER TABLESPACE tablespace_name ADD DATAFILE '/path/to/datafile.dbf' SIZE 10G;"
    fix_params:
      _int: "${__builtins__.int if '_int' not in env else _int}"

  - id: yasdb_temp_space_full
    name: Temporary Tablespace Full
    name_zh: 临时表空间不足
    category: storage
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Temporary tablespace usage exceeds 90%
    description_zh: 临时表空间使用率超过 90%
    condition: "temp_usage_pct > 90"
    params:
      temp_usage_pct: "${context.temp_ts_usage}"
    message: "Temporary tablespace usage {pct:.1f}%, sorting operations may fail"
    message_zh: "临时表空间使用率 {pct:.1f}%，排序操作可能失败"
    fix_sql: "ALTER TABLESPACE TEMP ADD TEMPFILE '/path/to/temp02.dbf' SIZE 10G;"
    fix_params:
      pct: "temp_usage_pct"

  - id: yasdb_undo_retention_low
    name: UNDO Retention Too Low
    name_zh: UNDO 保留时间不足
    category: durability
    db_types: [yashandb]
    severity: medium
    priority: medium
    owner: DBA
    enabled: true
    description: UNDO_RETENTION is less than 900 seconds
    description_zh: UNDO_RETENTION 设置低于 900 秒
    condition: "undo_retention > 0 and undo_retention < 900"
    params:
      undo_retention: "${context.undo_retention}"
    message: "UNDO retention is only {val} seconds, may not support Flashback Query"
    message_zh: "UNDO 保留时间仅 {val} 秒，可能无法支持 Flashback Query"
    fix_sql: "ALTER SYSTEM SET undo_retention = 900 SCOPE=BOTH;"

  - id: yasdb_invalid_objects
    name: Invalid Objects Exist
    name_zh: 存在无效对象
    category: maintenance
    db_types: [yashandb]
    severity: medium
    priority: medium
    owner: DBA
    enabled: true
    description: Database has INVALID status objects
    description_zh: 数据库存在 INVALID 状态的对象
    condition: "invalid_count > 0"
    params:
      invalid_count: "${context.invalid_cnt}"
    message: "Found {count} invalid objects, may cause reference errors"
    message_zh: "存在 {count} 个无效对象，可能导致引用错误"
    fix_sql: "SELECT OWNER, OBJECT_NAME, OBJECT_TYPE FROM DBA_OBJECTS WHERE STATUS='INVALID';\n-- Recompile:\nALTER PACKAGE package_name COMPILE;"
    fix_params:
      count: "invalid_count"

  - id: yasdb_archive_off
    name: Archive Log Disabled
    name_zh: 归档日志未开启
    category: backup
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Database is not in ARCHIVELOG mode
    description_zh: 数据库未运行在归档模式
    condition: "log_mode is not None and str(log_mode).upper() != 'ARCHIVELOG'"
    params:
      log_mode: "${context.log_mode}"
    message: "Database is not in ARCHIVELOG mode, cannot restore to arbitrary point in time"
    message_zh: "数据库未运行在归档模式，无法实现按时间点恢复"
    fix_sql: "-- 1. SHUTDOWN IMMEDIATE;\n-- 2. STARTUP MOUNT;\n-- 3. ALTER DATABASE ARCHIVELOG;\n-- 4. ALTER DATABASE OPEN;"

  - id: yasdb_lock_blocking
    name: Lock Blocking Detected
    name_zh: 锁阻塞检测
    category: performance
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Lock blocking chain detected
    description_zh: 检测到锁阻塞链
    condition: "len(blocking) > 0"
    params:
      blocking: "${context.lock_blocking}"
    message: "Found {n} lock blocking chains, affecting session performance"
    message_zh: "发现 {n} 条锁阻塞链，影响会话性能"
    fix_sql: "SELECT SID, SERIAL#, EVENT, SECONDS_IN_WAIT FROM V$SESSION WHERE BLOCKING_SESSION IS NOT NULL;\n-- Kill blocking session:\nALTER SYSTEM KILL SESSION 'sid,serial#' IMMEDIATE;"
    fix_params:
      n: "len(blocking)"

  - id: yasdb_deadlock_detected
    name: Deadlock Detected
    name_zh: 死锁检测
    category: performance
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Deadlock events detected
    description_zh: 检测到死锁事件
    condition: "len(deadlocks) > 0"
    params:
      deadlocks: "${context.lock_deadlock}"
    message: "Found {n} deadlock events, transactions are mutually waiting"
    message_zh: "发现 {n} 个死锁事件，事务相互等待"
    fix_sql: "SELECT * FROM V$LOCK WHERE BLOCK = 1;\n-- Review and resolve conflicting transactions"
    fix_params:
      n: "len(deadlocks)"

  - id: yasdb_sys_priv_grant
    name: Excessive System Privileges
    name_zh: 系统权限过度授权
    category: security
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Non-sys users granted DBA or SYSDBA privilege
    description_zh: 非系统用户被授予 DBA 或 SYSDBA 权限
    condition: "len(privs) > 0"
    params:
      privs: "${context.sys_privs}"
    message: "Found {n} non-sys users with elevated privileges, security risk"
    message_zh: "发现 {n} 个非系统用户拥有 elevated 权限，存在安全风险"
    fix_sql: "REVOKE DBA FROM username;"
    fix_params:
      n: "len(privs)"

  - id: yasdb_default_password
    name: Default Password Not Changed
    name_zh: 默认密码未修改
    category: security
    db_types: [yashandb]
    severity: high
    priority: high
    owner: DBA
    enabled: true
    description: Users still using default passwords
    description_zh: 用户仍使用默认密码
    condition: "len(default_pws) > 0"
    params:
      default_pws: "${context.default_pws}"
    message: "Found {n} users with default passwords, critical security risk"
    message_zh: "发现 {n} 个用户使用默认密码，存在严重安全风险"
    fix_sql: "ALTER USER username IDENTIFIED BY 'StrongPassword123';"
    fix_params:
      n: "len(default_pws)"
